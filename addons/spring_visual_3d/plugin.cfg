[plugin]

name="SpringVisual3D"
description="This Godot 4 add-on generates and deforms customizable 3D spring geometry purely through GPU vertex displacement. It uses high-performance vertex shaders to mathematically construct, twist and stretch the spring body in real time. Built for rapid implementation, it bypasses complex modelling and rig setups, giving you instant, programmatic control over spring rendering, scaling, and compression via simple and intuitive settings."
author="Jean d'Arc"
version="1.0"
script="plugin.gd"
license="MIT"
